# Infrastructure Services for Agentic Commerce Platform
# Includes Milvus vector database and Phoenix observability
#
# Usage:
#   Start infrastructure only (for local development):
#     docker compose -f docker-compose.infra.yml up -d
#
#   Start everything (full Docker deployment):
#     docker compose -f docker-compose.infra.yml -f docker-compose.yml up -d
#
# Services:
#   - Milvus (vector database): localhost:19530
#   - Phoenix (LLM tracing): localhost:6006
#   - MinIO Console: localhost:9001

services:
  # =============================================================================
  # MILVUS VECTOR DATABASE
  # =============================================================================

  # etcd - Metadata storage for Milvus
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: milvus-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -listen-client-urls=http://0.0.0.0:2379 -advertise-client-urls=http://milvus-etcd:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - acp-infra-network

  # MinIO - Object storage for Milvus
  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9001:9001"  # MinIO Console (for debugging)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - acp-infra-network

  # Milvus Standalone - Vector database
  milvus-standalone:
    image: milvusdb/milvus:v2.4.0
    container_name: milvus-standalone
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"  # Milvus gRPC port
      - "9091:9091"    # Milvus metrics/health port
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - acp-infra-network

  # =============================================================================
  # OBSERVABILITY
  # =============================================================================

  # Phoenix - LLM Observability and Tracing
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    ports:
      - "6006:6006"   # Phoenix UI and OTLP HTTP collector
      - "4317:4317"   # OTLP gRPC collector
    environment:
      - PHOENIX_WORKING_DIR=/mnt/data
    volumes:
      - phoenix_data:/mnt/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6006/')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - acp-infra-network

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  # External network - created by docker-compose-nim.yml (which starts first)
  # This allows NIMs to begin downloading models while infra services start
  acp-infra-network:
    external: true

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  etcd_data:
  minio_data:
  milvus_data:
  phoenix_data:
